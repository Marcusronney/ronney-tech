services:
  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # API HTTP do Tempo para o Grafana consultar
    networks:
      - observability

  otel-collector-traces:
    image: otel/opentelemetry-collector:0.149.0
    container_name: otel-collector-traces
    command: ["--config=/etc/otelcol-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-config.yaml:ro
    ports:
      # Usei 14317/14318 no host para evitar conflito com seu Collector atual em 4317/4318.
      # Dentro da rede Docker, as aplicações usam otel-collector-traces:4317 ou :4318.
      - "14317:4317" # OTLP gRPC
      - "14318:4318" # OTLP HTTP
    depends_on:
      - tempo
    networks:
      - observability

  api-trace-teste:
    build: ./api-test
    container_name: api-trace-teste
    environment:
      OTEL_SERVICE_NAME: api-trace-teste
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector-traces:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=lab,service.version=1.0.0
    ports:
      - "8000:8000"
    depends_on:
      - otel-collector-traces
    networks:
      - observability

volumes:
  tempo-data:

networks:
  observability:
    name: observability
